    <div class="flex-1 overflow-y-auto py-6 px-4 space-y-3">

      <a routerLink="/faturamento" routerLinkActive="bg-indigo-600 text-white ring-2 ring-indigo-500/30"

        <svg class="w-5 h-5 mr-3 text-indigo-400 group-hover:text-indigo-300 transition-colors" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

          </path>

        Listagem NFs

    <div class="p-6 border-t border-slate-800/80 text-xs text-slate-500 text-center">
      v1.0.0 &copy; 2026 Korp LTDA

  <!-- Container Mobile -->
  <div class="md:hidden flex flex-col w-full min-h-screen">
    <!-- Header Mobile -->
    <header class="bg-slate-900 shadow-md text-white h-16 flex items-center justify-between px-6 z-20">
      <span class="text-xl font-extrabold tracking-tight">Korp<span class="text-indigo-400">.Web</span></span>
      <!-- Mobile links simplificados em linha -->
      <div class="flex gap-4">
        <a routerLink="/produtos" routerLinkActive="text-indigo-400 font-bold"
          class="text-sm font-medium hover:text-indigo-300 transition-colors">Produtos</a>
        <a routerLink="/faturamento" routerLinkActive="text-indigo-400 font-bold"
          class="text-sm font-medium hover:text-indigo-300 transition-colors">Nova NF</a>
        <a routerLink="/notas-fiscais" routerLinkActive="text-indigo-400 font-bold"
          class="text-sm font-medium hover:text-indigo-300 transition-colors">Listagem</a>
      </div>
    </header>

    <!-- Main Content for Mobile -->
    <main class="flex-1 w-full bg-gray-50/50 pt-4">
      <router-outlet></router-outlet>

  <!-- Main Content Desktop -->
  <main class="hidden md:flex flex-1 flex-col h-screen overflow-x-hidden overflow-y-auto bg-gray-50/50">

    <header class="bg-white/80 backdrop-blur-md shadow-sm h-20 flex items-center justify-end px-10 z-10 sticky top-0">

        <div class="flex flex-col">
          <span class="text-sm font-bold text-gray-800 leading-none">Admin Korp</span>
          <span class="text-xs text-gray-500 mt-1 font-medium">Conta Master</span>
        </div>
      </div>
    </header>

    <!-- Page Content Slot -->
    <div class="p-8 2xl:p-12 h-fit flex-1 w-full">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
