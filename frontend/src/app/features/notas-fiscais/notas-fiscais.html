<div class="max-w-7xl mx-auto p-6 bg-gray-50 min-h-screen">

    <h1 class="text-3xl font-bold text-gray-800 mb-8">Listagem de Notas Fiscais</h1>


    <div class="bg-white p-6 rounded-lg shadow-md">
        <div class="overflow-hidden ring-1 ring-black ring-opacity-5 rounded-lg">
            <table class="min-w-full divide-y divide-gray-300">
                <thead class="bg-gray-100">
                    <tr>
                        <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 sm:pl-6">
                            Seq. ID</th>
                        <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Itens</th>
                        <th scope="col" class="px-3 py-3.5 text-center text-sm font-semibold text-gray-900">Status</th>
                        <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Ação</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200 bg-white">
                    <tr *ngFor="let nf of notasFiscais" class="hover:bg-gray-50 transition-colors">
                        <!-- N Sequencial -->
                        <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-bold text-gray-900 sm:pl-6">
                            #{{ nf.numeroSequencial }}
                        </td>

                        <!-- Itens -->
                        <td class="px-3 py-2 text-sm text-gray-500">
                            <ul class="list-disc pl-5">
                                <li *ngFor="let item of nf.itens">
                                    <span class="font-semibold">{{ item.quantidade }}x</span> {{ item.produtoCodigo }}
                                </li>
                            </ul>
                        </td>

                        <!-- Status -->
                        <td class="whitespace-nowrap px-3 py-4 text-center">
                            <span
                                [ngClass]="{'bg-blue-100 text-blue-800': nf.status === 1, 'bg-gray-200 text-gray-600': nf.status === 0}"
                                class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold uppercase tracking-wider">
                                {{ nf.status === 1 ? 'Aberta' : 'Fechada' }}
                            </span>
                        </td>

                        <!-- Impressão -->
                        <td class="whitespace-nowrap px-3 py-4 text-right">
                            <!-- Botão Imprimir -->
                            <button *ngIf="nf.status === 1" (click)="imprimirNota(nf.id)"
                                [disabled]="processingId === nf.id"
                                class="inline-flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-1.5 px-4 rounded text-sm transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed w-28">

                                <ng-container *ngIf="processingId !== nf.id">
                                    <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                                        </path>
                                    </svg>
                                    Imprimir
                                </ng-container>

                                <!-- Spinner de Loading -->
                                <ng-container *ngIf="processingId === nf.id">
                                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
                                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                            stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor"
                                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                        </path>
                                    </svg>
                                    Progresso
                                </ng-container>

                            </button>

                            <span *ngIf="nf.status === 0" class="text-sm font-semibold text-gray-400 italic">
                                Impressa
                            </span>
                        </td>
                    </tr>

                    <!-- Empty State -->
                    <tr *ngIf="notasFiscais.length === 0">
                        <td colspan="4" class="px-6 py-8 text-sm text-gray-500 text-center flex-col items-center">
                            <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                </path>
                            </svg>
                            <p class="mt-2 text-gray-900 font-medium">Nenhuma nota fiscal encontrada</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
