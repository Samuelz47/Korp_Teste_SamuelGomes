<div class="max-w-4xl mx-auto p-6 bg-gray-50 min-h-screen">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Gerar Nova Nota Fiscal</h1>

    <!-- Snackbar de Notificações -->
    <div *ngIf="mensagem" [ngClass]="{
         'bg-green-100 text-green-700 border-green-400': mensagem.tipo === 'sucesso', 
         'bg-red-100 text-red-700 border-red-400': mensagem.tipo === 'erro'
       }" class="border px-4 py-3 rounded relative mb-6 shadow-sm transition-all duration-300">
        <span class="block sm:inline whitespace-pre-wrap">{{ mensagem.texto }}</span>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <form [formGroup]="faturamentoForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <!-- Seção: Resumo (Header estático Fake Visual) -->
            <div class="flex items-center space-x-4 border-b pb-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Status Atual</label>
                    <span
                        class="inline-flex items-center px-3 mt-2 py-1 rounded-full text-xs box-border tracking-wider font-bold bg-blue-100 text-blue-800 uppercase shadow-sm">
                        {{ statusVisual }}
                    </span>
                </div>
                <div class="pt-7 pl-4 text-sm text-gray-500 border-l border-gray-200">
                    A numeração oficial e IDs da nota serão gerados e definidos pela API após a emissão.
                </div>
            </div>

            <!-- Seção: FormArray (Lista Dinâmica) -->
            <div>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-700">Lista de Produtos na Nota</h2>
                    <!-- Botão "Adicionar Item" -->
                    <button type="button" (click)="adicionarItem()"
                        class="bg-indigo-50 border border-indigo-200 text-indigo-700 hover:bg-indigo-100 font-semibold py-2 px-4 rounded-md text-sm transition-colors flex items-center shadow-sm">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4">
                            </path>
                        </svg>
                        Adicionar Item
                    </button>
                </div>

                <!-- Envelope Pai do Array -->
                <div formArrayName="itens" class="space-y-4">

                    <!-- Iteração das Linhas (FormGroup dinâmico) -->
                    <div *ngFor="let itemForm of itensFormArray.controls; let i = index" [formGroupName]="i"
                        class="flex items-start space-x-4 p-5 border rounded-lg bg-gray-50 hover:bg-indigo-50/10 transition-colors shadow-sm relative group overflow-hidden border-gray-200">

                        <div class="w-8 pt-3 font-bold text-gray-400 text-sm">#{{ i + 1 }}</div>

                        <div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-6">

                            <!-- Campo: Código -->
                            <div>
                                <label [for]="'produtoCodigo' + i"
                                    class="block text-sm font-semibold text-gray-700 mb-1">Código do Produto *</label>
                                <input [id]="'produtoCodigo' + i" type="text" formControlName="produtoCodigo"
                                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-3 border placeholder-gray-300 bg-white"
                                    placeholder="Ex: Notebook">
                                <span
                                    *ngIf="itemForm.get('produtoCodigo')?.invalid && itemForm.get('produtoCodigo')?.touched"
                                    class="text-xs text-red-500 mt-2 font-medium tracking-wide">Preencha um
                                    código.</span>
                            </div>

                            <!-- Campo: Quantidade -->
                            <div>
                                <label [for]="'quantidade' + i"
                                    class="block text-sm font-semibold text-gray-700 mb-1">Quantidade Inserida *</label>
                                <input [id]="'quantidade' + i" type="number" formControlName="quantidade" min="1"
                                    step="1"
                                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-3 border bg-white"
                                    placeholder="Ex: 10">
                                <span *ngIf="itemForm.get('quantidade')?.invalid && itemForm.get('quantidade')?.touched"
                                    class="text-xs text-red-500 mt-2 font-medium tracking-wide">A qtde min. é 1.</span>
                            </div>
                        </div>

                        <!-- Botão de Excluir Linha -->
                        <div class="pt-6">
                            <button type="button" (click)="removerItem(i)" title="Remover item da nota"
                                class="text-red-400 hover:text-red-600 bg-white border border-red-100 hover:border-red-300 p-2.5 rounded shadow-sm hover:shadow transition-all group-hover:block focus:outline-none focus:ring-2 focus:ring-red-200">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Final -->
            <div class="pt-6 border-t mt-12 flex justify-end">
                <button type="submit" [disabled]="faturamentoForm.invalid"
                    class="bg-indigo-600 border border-transparent text-white font-bold py-3.5 px-8 rounded-lg shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors text-base tracking-wide flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Emitir Nota Fiscal
                </button>
            </div>

        </form>
    </div>
</div>
